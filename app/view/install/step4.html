<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>安装完成 - {$config['siteName']}系统安装</title>
    {include file="install/step-base"}
</head>
<body>
<div class="layui-container">
    {if($admin_install)}
    <h1 class="install-h1">安装成功</h1>
    <blockquote class="layui-elem-quote" style="text-align:center">
        <h1>安装成功</h1>

        <a href="javascript:void(0)" class="layui-btn layui-btn-danger layui-btn-radius next">后台登录</a>
    </div>
    {else/}
