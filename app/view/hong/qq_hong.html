<html>
<head>
    <meta charset="UTF-8">
    <title>使用浏览器打开</title>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black" name="apple-mobile-web-app-status-bar-style">
    <meta name="format-detection" content="telephone=no">
    <meta content="false" name="twcClient" id="twcClient">
    <meta name="aplus-touch" content="1">
    <script src="/statics/layui/layui.js" v="2.7.2" e="layui"></script>
    <script>var $ = layui.jquery</script>
    <style>
        body, html {
            width: 100%;
            height: 100%
        }

        * {
            margin: 0;
            padding: 0
        }

        body {
            background-color: #fff
        }

        p {
            font-size: 18px;
        }

        .top-bar-guidance {
            font-size: 15px;
            color: #fff;
            height: 30%;
            line-height: 1.8;
            padding-left: 20px;
            padding-top: 20px;
            background: url(/static/common/hong/0.png) center top/contain no-repeat
        }

        .top-bar-guidance .icon-safari {
            width: 25px;
            height: 25px;
            vertical-align: middle;
            margin: 0 .2em
        }

        .app-download-tip .guidance-desc {
            background-color: #fff;
            padding: 0 5px
        }

        .app-download-btn {
            cursor: pointer;
            display: block;
            width: 214px;
            height: 40px;
            line-height: 40px;
            margin: 18px auto 0 auto;
            text-align: center;
            font-size: 18px;
            color: #2466f4;
            border-radius: 20px;
            border: .5px #2466f4 solid;
            text-decoration: none
        }
    </style>
</head>
<body>
<div class="top-bar-guidance">
    <p>点击右上角 选择浏览器打开</span></p>
    <p>可以继续浏览本站哦~</p>
</div>

<a data-clipboard-text="{$url}" class="app-download-btn">点此复制本站网址</a>
<div  style="position: absolute;bottom: 0;width: 100%;">
    <a style="" href="{$url}" id="vurl" rel="noreferrer"><img style="width:100%;margin-top:-300px;" src="/static/common/hong/001.jpg"></a>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.0/clipboard.min.js"></script>
<script>

    // 初始化 Clipboard.js
    var clipboard = new ClipboardJS('.app-download-btn');

    // 复制成功的回调
    clipboard.on('success', function (e) {
        layer.msg('复制成功');
        e.clearSelection();
    });

    // 复制失败的回调
    clipboard.on('error', function (e) {
        layer.msg('复制失败，请手动复制');
    });
    function openu(u) {
        document.getElementById("vurl").href = u;
        document.getElementById("vurl").click();
    }

    var url = '{$url}';
    if (navigator.userAgent.indexOf("QQ/") > -1) {
        openu("ucbrowser://" + url);
        openu("qqbrowser://" + url);
        openu("mttbrowser://url=" + url);
        openu("baiduboxapp://browse?url=" + url);
        openu("googlechrome://browse?url=" + url);
        openu("mibrowser:" + url);
        $("html").on("click", function () {
            openu("ucbrowser://" + url);
            openu("mttbrowser://url=" + url);
            openu("baiduboxapp://browse?url=" + url);
            openu("googlechrome://browse?url=" + url);
            openu("mibrowser:" + url);
        });
    } else if (navigator.userAgent.indexOf("MicroMessenger") > -1) {
        if (navigator.userAgent.indexOf("Android") > -1) {
            var iframe = document.createElement("iframe");
            iframe.style.display = "none";
            document.body.appendChild(iframe);
        } else {

        }
    }
</script>
</body>
</html>
